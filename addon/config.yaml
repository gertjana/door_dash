name: ePaper Dashboard
version: "0.2.0"
slug: epaper_dashboard
description: Renders an 800x480 1-bit dashboard image for the reTerminal E1001
url: https://github.com/anomalyco/reterminal_dashboard
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:image-frame
homeassistant_api: true
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": Dashboard image endpoint (LAN)

options:
  wifi_ssid: "<Your Wi-Fi SSID>"
  wifi_password: "<Your Wi-Fi password>"
  wifi_security: "WPA"
  wifi_hidden: false
  weather_entity: "weather.home"
  calendar_entities:
    - "calendar.personal"
  max_events: 8
  timezone: "Europe/Amsterdam"
  refresh_cache_seconds: 60
  show_local_sensors: true
  show_tesla: true
  tesla_battery_entity: ""
  tesla_charging_entity: ""

schema:
  wifi_ssid: str
  wifi_password: password
  wifi_security: list(WPA|WEP|nopass)
  wifi_hidden: bool
  weather_entity: str
  calendar_entities:
    - str
  max_events: int(1,20)
  timezone: str
  refresh_cache_seconds: int(10,3600)
  show_local_sensors: bool
  show_tesla: bool
  tesla_battery_entity: str?
  tesla_charging_entity: str?
