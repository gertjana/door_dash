repos:
  # Standard hygiene: trailing whitespace, end-of-file, large files, merge conflicts, etc.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-yaml
        # ESPHome configs use !secret, !lambda, etc. — skip those files here;
        # yamllint below validates structural correctness instead.
        exclude: ^firmware/.*\.ya?ml$
      - id: check-toml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # YAML linter — structure, indentation, line length warnings.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  # Python linter + formatter (Ruff replaces flake8 + isort + black for our use).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
